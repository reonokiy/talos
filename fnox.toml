#:schema https://fnox.jdx.dev/schema.json

# Secrets are resolved only for `fnox exec` subprocesses and never injected
# into the ordinary interactive shell.
if_missing = "error"
env = "exec"

# Local operators authenticate through 1Password Desktop. Full op:// references
# select the vault for each item; the provider itself is not vault-scoped.
[providers.op]
type = "1password"

# Supplies the account-level B2 credential used only by local Terraform runs
# to create the bucket and rotate scoped application keys. fnox itself uses the
# local Desktop session; only Terraform receives the Service Account token.
[profiles.b2-terraform.secrets]
TF_VAR_onepassword_service_account_token = { provider = "op", value = "op://talos.nokiy.net/service-account/credential" }
TF_CLOUD_ORGANIZATION = { default = "reonokiy" }
TF_WORKSPACE = { default = "talos-b2" }
TF_TOKEN_app_terraform_io = { provider = "op", value = "op://dev/terraform/API_TOKEN"}
B2_APPLICATION_KEY_ID = { provider = "op", value = "op://dev/b2eu/MASTER_KEY_ID" }
B2_APPLICATION_KEY = { provider = "op", value = "op://dev/b2eu/MASTER_KEY" }

# Publishes the rendered active bundle and versioned release copies to B2.
# It also provisions the B2 writer in GitHub's production Environment.
[profiles.publisher.secrets]
B2_ENDPOINT = { provider = "op", value = "op://talos.nokiy.net/b2-talos-nokiy-net/ENDPOINT" }
B2_REGION = { provider = "op", value = "op://talos.nokiy.net/b2-talos-nokiy-net/REGION" }
B2_BUCKET = { provider = "op", value = "op://talos.nokiy.net/b2-talos-nokiy-net/BUCKET" }
B2_PREFIX = { provider = "op", value = "op://talos.nokiy.net/b2-talos-nokiy-net/CURRENT_PREFIX" }
B2_ARCHIVE_PREFIX = { provider = "op", value = "op://talos.nokiy.net/b2-talos-nokiy-net/RELEASES_PREFIX" }
AWS_ACCESS_KEY_ID = { provider = "op", value = "op://talos.nokiy.net/b2-talos-nokiy-net/ACCESS_KEY" }
AWS_SECRET_ACCESS_KEY = { provider = "op", value = "op://talos.nokiy.net/b2-talos-nokiy-net/SECRET_KEY" }

# Bootstraps Flux with the read-only credential needed to fetch the active B2
# bundle. This profile cannot publish or restore cluster state.
[profiles.flux-bootstrap.secrets]
B2_ENDPOINT = { provider = "op", value = "op://talos.nokiy.net/b2-talos-nokiy-net/ENDPOINT" }
B2_REGION = { provider = "op", value = "op://talos.nokiy.net/b2-talos-nokiy-net/REGION" }
B2_BUCKET = { provider = "op", value = "op://talos.nokiy.net/b2-talos-nokiy-net/BUCKET" }
B2_PREFIX = { provider = "op", value = "op://talos.nokiy.net/b2-talos-nokiy-net/CURRENT_PREFIX" }
B2_READ_KEY_ID = { provider = "op", value = "op://talos.nokiy.net/b2-talos-nokiy-net/READ_ACCESS_KEY" }
B2_READ_APPLICATION_KEY = { provider = "op", value = "op://talos.nokiy.net/b2-talos-nokiy-net/READ_SECRET_KEY" }

# Bootstraps one namespaced copy of the read-only 1Password Service Account
# token for each application SecretStore. The account is restricted to the
# talos.nokiy.net vault; item access cannot be narrowed further by 1Password.
[profiles.external-secrets-bootstrap.secrets]
ONEPASSWORD_SERVICE_ACCOUNT_TOKEN = { provider = "op", value = "op://talos.nokiy.net/service-account/credential" }

# Reads one archived release with the recovery credential, then republishes it
# as the active bundle with the same writer used by the publisher profile.
[profiles.rollback.secrets]
B2_ENDPOINT = { provider = "op", value = "op://talos.nokiy.net/b2-talos-nokiy-net/ENDPOINT" }
B2_REGION = { provider = "op", value = "op://talos.nokiy.net/b2-talos-nokiy-net/REGION" }
B2_BUCKET = { provider = "op", value = "op://talos.nokiy.net/b2-talos-nokiy-net/BUCKET" }
B2_PREFIX = { provider = "op", value = "op://talos.nokiy.net/b2-talos-nokiy-net/CURRENT_PREFIX" }
B2_ARCHIVE_PREFIX = { provider = "op", value = "op://talos.nokiy.net/b2-talos-nokiy-net/RELEASES_PREFIX" }
AWS_ACCESS_KEY_ID = { provider = "op", value = "op://talos.nokiy.net/b2-talos-nokiy-net/ACCESS_KEY" }
AWS_SECRET_ACCESS_KEY = { provider = "op", value = "op://talos.nokiy.net/b2-talos-nokiy-net/SECRET_KEY" }
B2_RECOVERY_READ_KEY_ID = { provider = "op", value = "op://talos.nokiy.net/b2-talos-nokiy-net/RECOVERY_ACCESS_KEY" }
B2_RECOVERY_READ_APPLICATION_KEY = { provider = "op", value = "op://talos.nokiy.net/b2-talos-nokiy-net/RECOVERY_SECRET_KEY" }
