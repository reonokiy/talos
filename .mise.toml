[tools]
kubectl = "1.36.2"
helm = "4.2.2"
helmfile = "1.2.2"
flux2 = "2.9.1"
talosctl = "1.13.6"
omnictl = "1.9.1"
aws-cli = "2.35.20"
cosign = "3.1.1"
shellcheck = "0.11.0"
actionlint = "1.7.12"
yq = "4.53.3"
cilium-cli = "0.19.5"
kubelogin = "1.36.2"
fnox = "1.30.0"
gh = "2.96.0"
terraform = "1.13.5"
op = "latest"

[tasks.check]
description = "Render the production bundle and template the pinned Cilium chart"
run = "./scripts/check.sh"

[tasks.lint]
description = "Lint shell scripts and GitHub Actions workflows"
run = [
  "shellcheck scripts/*.sh tests/*.sh tests/fixtures/omnictl",
  "actionlint .github/workflows/*.yaml",
  "./scripts/check-ci-boundary.sh",
  "terraform fmt -check -recursive terraform",
]

[tasks.test]
description = "Run operator workflow tests with a mock Omni CLI"
run = "./tests/rotate-omni-join-token.sh"

[tasks.validate]
description = "Run all repository validation"
depends = ["check", "lint", "test", "b2:tf:validate"]

[tasks.render]
description = "Render the single production bundle"
run = "./scripts/render.sh"

[tasks.publish-b2]
description = "Load the B2 publisher from 1Password and publish the bundle"
run = "fnox --no-daemon --profile publisher exec --no-defaults -- ./scripts/publish-b2.sh"

[tasks.publish-b2-ci]
description = "Publish using B2 values already injected by GitHub Environment"
run = "./scripts/publish-b2.sh"

[tasks.bootstrap-cilium]
description = "Apply the declarative Cilium bootstrap release"
run = "./scripts/bootstrap-cilium.sh"

[tasks.bootstrap-flux]
description = "Apply the declarative Flux release and B2 source"
run = "fnox --no-daemon --profile flux-bootstrap exec --no-defaults -- ./scripts/bootstrap-flux-b2.sh"

[tasks.rotate-omni-join-token]
description = "Manually rotate Omni's default SideroLink join token"
run = "./scripts/rotate-omni-join-token.sh"

[tasks.sync-flux-secret]
description = "Reload the prefix-scoped Flux B2 reader from 1Password"
run = "fnox --no-daemon --profile flux-bootstrap exec --no-defaults -- ./scripts/sync-flux-b2-secret.sh"

[tasks.sync-external-secrets-secret]
description = "Sync the 1Password Service Account token into the external-secrets namespace"
run = "fnox --no-daemon --profile external-secrets-bootstrap exec --no-defaults -- ./scripts/sync-external-secrets-secret.sh"

[tasks.configure-github]
description = "Load the publisher from 1Password into GitHub Environment"
run = "fnox --no-daemon --profile publisher exec --no-defaults -- ./scripts/configure-github.sh"

[tasks.rollback-b2]
description = "Restore a versioned B2 release; pass the release Git SHA as an argument"
run = "fnox --no-daemon --profile rollback exec --no-defaults -- ./scripts/rollback-b2.sh"

[tasks.status]
description = "Show Kubernetes, Flux and Cilium state"
run = [
  "kubectl get nodes",
  "flux get all -A",
  "cilium status --wait --interactive=false --wait-duration 1m --output summary",
]

[tasks."b2:tf:init"]
description = "Initialize the B2 Terraform stack"
dir = "terraform/b2"
run = "fnox --no-daemon --profile b2-terraform exec --no-defaults -- terraform init"

[tasks."b2:tf:validate"]
description = "Initialize providers without a backend and validate the B2 stack"
dir = "terraform/b2"
run = [
  "terraform init -backend=false",
  "terraform validate",
]

[tasks."b2:tf:plan"]
description = "Plan the B2 bucket and scoped application keys"
dir = "terraform/b2"
run = "fnox --no-daemon --profile b2-terraform exec --no-defaults -- terraform plan"

[tasks."b2:tf:apply"]
description = "Apply the B2 bucket and scoped application keys"
dir = "terraform/b2"
run = "fnox --no-daemon --profile b2-terraform exec --no-defaults -- terraform apply"

[tasks."b2:tf:import-manual"]
description = "Import an existing B2 bucket with fnox-managed credentials"
run = "fnox --no-daemon --profile b2-terraform exec --no-defaults -- ./scripts/import-b2-terraform.sh"
