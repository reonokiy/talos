name: Publish Flux release to B2

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-production
  cancel-in-progress: false

jobs:
  publish:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Install locked tools with mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: 2026.7.5
          install: true
          install_args: --locked kubectl helm helmfile aws-cli
          cache: true

      - name: Publish immutable repository snapshot and active entrypoint
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.B2_WRITE_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.B2_WRITE_APPLICATION_KEY }}
          AWS_DEFAULT_REGION: ${{ vars.B2_REGION }}
          B2_ENDPOINT: ${{ vars.B2_ENDPOINT }}
          B2_REGION: ${{ vars.B2_REGION }}
          B2_BUCKET: ${{ vars.B2_BUCKET }}
          B2_PREFIX: ${{ vars.B2_PREFIX }}
          B2_ARCHIVE_PREFIX: ${{ vars.B2_ARCHIVE_PREFIX }}
          RELEASE_ID: ${{ github.sha }}
        # mise-action installed the exact CI tools above. Skip task auto-install
        # so this job never downloads the local-only fnox or 1Password CLI.
        run: mise run --skip-tools publish-b2-ci
