name: Validate GitOps configuration

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Install locked tools with mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: 2026.7.5
          install: true
          install_args: --locked kubectl helm helmfile terraform shellcheck actionlint
          cache: true

      - name: Validate
        # Keep CI independent from local-only fnox and the 1Password CLI.
        run: mise run --skip-tools validate
