apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
  namespace: external-secrets
spec:
  # Stage 1 of the CRD ownership repair: stop this existing release before it
  # can prune CRDs omitted from its desired manifest. Resume only after the
  # CRD release has restored every CRD with resource-policy: keep.
  suspend: true
  dependsOn:
    - name: external-secrets-crds
  interval: 30m
  releaseName: external-secrets
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: external-secrets
      version: 2.6.0
      sourceRef:
        kind: HelmRepository
        name: external-secrets
        namespace: flux-system
      interval: 24h
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  values:
    installCRDs: false
    processClusterExternalSecret: false
    processClusterStore: true
    processClusterGenerator: false
    processClusterPushSecret: false
    processPushSecret: false
    processSecretStore: false
    genericTargets:
      enabled: false
    extraObjects:
      - apiVersion: external-secrets.io/v1
        kind: ClusterSecretStore
        metadata:
          name: onepassword
        spec:
          conditions:
            - namespaceSelector:
                matchLabels:
                  secrets.nokiy.net/onepassword: enabled
          provider:
            onepasswordSDK:
              vault: talos.nokiy.net
              auth:
                serviceAccountSecretRef:
                  name: onepassword-service-account
                  namespace: external-secrets
                  key: token
    rbac:
      aggregateToView: false
      aggregateToEdit: false
    leaderElect: true
    readinessProbe:
      enabled: true
    resources:
      requests:
        cpu: 20m
        memory: 64Mi
