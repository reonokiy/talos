apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
  namespace: external-secrets
spec:
  # Stage 2 of the CRD ownership repair: the CRD release is suspended after
  # recording the keep policy. Resume this original release and take ownership
  # of the established CRDs; retire the CRD release only after live validation.
  interval: 30m
  releaseName: external-secrets
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: external-secrets
      version: 2.6.0
      sourceRef:
        kind: HelmRepository
        name: external-secrets
        namespace: flux-system
      interval: 24h
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    disableTakeOwnership: false
    remediation:
      retries: 3
      strategy: rollback
  values:
    installCRDs: true
    crds:
      annotations:
        helm.sh/resource-policy: keep
      createClusterExternalSecret: false
      createClusterSecretStore: true
      createSecretStore: false
      createClusterGenerator: false
      createClusterPushSecret: false
      createPushSecret: false
    processClusterExternalSecret: false
    processClusterStore: true
    processClusterGenerator: false
    processClusterPushSecret: false
    processPushSecret: false
    processSecretStore: false
    genericTargets:
      enabled: false
    extraObjects:
      - apiVersion: external-secrets.io/v1
        kind: ClusterSecretStore
        metadata:
          name: onepassword
        spec:
          conditions:
            - namespaceSelector:
                matchLabels:
                  secrets.nokiy.net/onepassword: enabled
          provider:
            onepasswordSDK:
              vault: talos.nokiy.net
              auth:
                serviceAccountSecretRef:
                  name: onepassword-service-account
                  namespace: external-secrets
                  key: token
    rbac:
      aggregateToView: false
      aggregateToEdit: false
    leaderElect: true
    readinessProbe:
      enabled: true
    resources:
      requests:
        cpu: 20m
        memory: 64Mi
