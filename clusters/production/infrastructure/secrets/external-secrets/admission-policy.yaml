apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: external-secrets-namespaced-access
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups:
          - external-secrets.io
        apiVersions:
          - v1
        operations:
          - CREATE
          - UPDATE
        resources:
          - externalsecrets
  validations:
    - expression: object.spec.secretStoreRef.kind == 'ClusterSecretStore' && object.spec.secretStoreRef.name == 'onepassword'
      message: ExternalSecret must reference the centrally managed onepassword ClusterSecretStore.
    - expression: object.spec.target.creationPolicy == 'Owner'
      message: ExternalSecret must own its generated Kubernetes Secret.
    - expression: '!has(object.spec.dataFrom) || size(object.spec.dataFrom) == 0'
      message: dataFrom is forbidden because it can bypass item-level namespace prefixes.
    - expression: has(object.spec.data) && size(object.spec.data) > 0
      message: ExternalSecret must declare explicit data remote references.
    - expression: object.spec.data.all(entry, entry.remoteRef.key.matches('^' + object.metadata.namespace + '/[^/]+/[^/]+$'))
      message: Every 1Password reference must use <item>/<section>/<field>, with the item equal to the ExternalSecret namespace.
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: external-secrets-namespaced-access
spec:
  policyName: external-secrets-namespaced-access
  validationActions:
    - Deny
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: external-secrets-onepassword-store
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups:
          - external-secrets.io
        apiVersions:
          - v1
        operations:
          - CREATE
          - UPDATE
        resources:
          - clustersecretstores
  validations:
    - expression: has(object.spec.provider.onepasswordSDK)
      message: ClusterSecretStore must use the 1Password SDK provider.
    - expression: object.spec.provider.onepasswordSDK.vault == 'talos.nokiy.net'
      message: ClusterSecretStore may only use the talos.nokiy.net vault.
    - expression: object.spec.provider.onepasswordSDK.auth.serviceAccountSecretRef.name == 'onepassword-service-account'
      message: ClusterSecretStore must use the central bootstrap Service Account Secret.
    - expression: object.spec.provider.onepasswordSDK.auth.serviceAccountSecretRef.namespace == 'external-secrets'
      message: ClusterSecretStore token must remain in the external-secrets namespace.
    - expression: object.spec.provider.onepasswordSDK.auth.serviceAccountSecretRef.key == 'token'
      message: ClusterSecretStore must reference the token field of its bootstrap Secret.
    - expression: size(object.spec.conditions) == 1 && object.spec.conditions[0].namespaceSelector.matchLabels['secrets.nokiy.net/onepassword'] == 'enabled'
      message: ClusterSecretStore must be restricted to explicitly labeled namespaces.
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: external-secrets-onepassword-store
spec:
  policyName: external-secrets-onepassword-store
  validationActions:
    - Deny
