apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets-crds
  namespace: external-secrets
spec:
  interval: 30m
  releaseName: external-secrets-crds
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: external-secrets
      version: 2.6.0
      sourceRef:
        kind: HelmRepository
        name: external-secrets
        namespace: flux-system
      interval: 24h
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  values:
    installCRDs: true
    createOperator: false
    webhook:
      create: false
    certController:
      create: false
    rbac:
      create: false
    serviceAccount:
      create: false
    crds:
      createClusterExternalSecret: false
      createClusterSecretStore: true
      createSecretStore: false
      createClusterGenerator: false
      createClusterPushSecret: false
      createPushSecret: false
    processClusterExternalSecret: false
    processClusterStore: false
    processSecretStore: false
    processClusterGenerator: false
    processClusterPushSecret: false
    processPushSecret: false
