apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
  annotations:
    # Losing the B2 source or accidentally removing this manifest must not
    # uninstall the cluster CNI. Intentional removal is a manual operation.
    kustomize.toolkit.fluxcd.io/prune: disabled
spec:
  interval: 30m
  releaseName: cilium
  driftDetection:
    mode: enabled
  chartRef:
    kind: OCIRepository
    name: cilium
    namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  valuesFrom:
    - kind: ConfigMap
      name: cilium-values
      valuesKey: values.yaml
