apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
  annotations:
    # Longhorn must be removed only through its reviewed uninstall procedure.
    kustomize.toolkit.fluxcd.io/prune: disabled
spec:
  interval: 30m
  timeout: 20m
  releaseName: longhorn
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: longhorn
      version: "1.12.0"
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system
      interval: 24h
  # Storage releases must not be uninstalled or rolled back automatically after
  # a transient failure. Longhorn does not support version downgrades.
  install:
    crds: CreateReplace
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  upgrade:
    crds: CreateReplace
    cleanupOnFail: false
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  valuesFrom:
    - kind: ConfigMap
      name: longhorn-values
      valuesKey: values.yaml
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: CustomResourceDefinition
              labelSelector: longhorn-manager
            patch: |
              - op: add
                path: /metadata/annotations/helm.sh~1resource-policy
                value: keep
