# This file is the single source of truth for both bootstrap Helm and Flux.
ipam:
  mode: kubernetes

kubeProxyReplacement: true
k8sServiceHost: localhost
k8sServicePort: 7445

routingMode: tunnel
tunnelProtocol: vxlan

# KubeSpan already encrypts node-to-node traffic.
encryption:
  enabled: false

# Reuse Talos' cgroup v2 mount.
cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup

# Talos host DNS forwarding and eBPF host routing otherwise conflict.
bpf:
  hostLegacyRouting: true
  # Keep eBPF masquerading off: Talos documents that advanced Cilium eBPF
  # masquerading can conflict with KubeSpan's node-to-node routing.
  masquerade: false

securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE

operator:
  replicas: 2
  rollOutPods: true

rollOutCiliumPods: true

hubble:
  relay:
    enabled: true
  ui:
    enabled: true
